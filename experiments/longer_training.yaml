# deep_architecture and low_lr both hit their test_min at the final epoch (50) — not converged.
# Run the best config (gelu + shallow) for 150 epochs to see how far it can go.

dataset:
  data_dir: "ex1_data"
  clean: true
  test_size: 0.1
  p_augment: 0.5
  aug_temperature: 1.0

model:
  num_inputs: 180
  hidden_layer_dim: [64]
  dropout: 0.3
  act_fn: "GELU"

loss:
  neg_multiplier: 3.0

training:
  num_epochs: 150
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 1.0e-5
  scheduler_factor: 0.5
  scheduler_patience: 15
  scheduler_min_lr: 1.0e-6

evaluation:
  batch_size: 512
  protein_paths:
    - "sars.txt"
    - "insr.txt"

output:
  output_dir: "results/longer_training"
