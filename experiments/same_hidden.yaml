dataset:
  data_dir: "ex1_data"
  clean: true
  test_size: 0.1
  p_augment: 0.0
  aug_temperature: 0.0
  use_blosum: false

model:
  num_inputs: 180
  hidden_layer_dim: [180, 180]
  dropout: 0.0
  act_fn: "ReLU"

loss:
  neg_multiplier: 1.0

training:
  num_epochs: 50
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 1.0e-5
  scheduler_factor: 0.5
  scheduler_patience: 10
  scheduler_min_lr: 1.0e-5

evaluation:
  batch_size: 512
  protein_paths:
    - "sars.txt"

output:
  output_dir: "results/same_hidden"
