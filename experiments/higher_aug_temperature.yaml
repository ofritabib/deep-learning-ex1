# no_augmentation and strong_weight_decay both overfit hard — augmentation clearly helps.
# The current aug_temperature=1.0 controls mutation randomness. Try 2.0 for more aggressive
# diversity, which may help A0201 (the hardest class, only 261 samples).

dataset:
  data_dir: "ex1_data"
  clean: true
  test_size: 0.1
  p_augment: 0.5
  aug_temperature: 2.0

model:
  num_inputs: 180
  hidden_layer_dim: [64]
  dropout: 0.3
  act_fn: "GELU"

loss:
  neg_multiplier: 4.5

training:
  num_epochs: 100
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 1.0e-5
  scheduler_factor: 0.5
  scheduler_patience: 15
  scheduler_min_lr: 1.0e-6

evaluation:
  batch_size: 512
  protein_paths:
    - "sars.txt"
    - "insr.txt"

output:
  output_dir: "results/higher_aug_temperature"
