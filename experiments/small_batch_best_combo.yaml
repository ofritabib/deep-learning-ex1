# small_batch (batch=64) was competitive on its own (F1=0.805).
# Combine it with the best_combo settings (GELU + shallow + neg=4.5) to see if
# the gradient noise further helps generalization.

dataset:
  data_dir: "ex1_data"
  clean: true
  test_size: 0.1
  p_augment: 0.5
  aug_temperature: 1.0

model:
  num_inputs: 180
  hidden_layer_dim: [64]
  dropout: 0.3
  act_fn: "GELU"

loss:
  neg_multiplier: 4.5

training:
  num_epochs: 100
  batch_size: 64
  lr: 5.0e-4
  weight_decay: 1.0e-5
  scheduler_factor: 0.5
  scheduler_patience: 15
  scheduler_min_lr: 1.0e-6

evaluation:
  batch_size: 512
  protein_paths:
    - "sars.txt"
    - "insr.txt"

output:
  output_dir: "results/small_batch_best_combo"
